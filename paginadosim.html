<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Você aceitou 😍</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff4e50, #fc913a);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.4);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
    }

    .heart {
      font-size: 50px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #ff4e50;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Sabia que você ia dizer SIM 😏</h1>
  <p>Agora não tem mais volta... 👀</p>

  <div class="heart">❤️</div>

  <button onclick="voltar()">Voltar</button>
</div>

<script>
  function voltar() {
    window.history.back();
  }
</script>

</body>
</html>
